# This workflow will install the python package and dependencies, and run tests against a variety of Python versions

name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: "0 0 * * 0"  # Every Sunday

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
    - name: Install base (no extras, no dev)
      run: |
        uv sync --no-dev
        uv pip install pytest
    - name: Test with pytest (Tests should pass without extra dependancies installed)
      run: |
        uv run --no-sync python -m quantumflow.about
        uv run --no-sync pytest
    - name: Install extra dependencies
      if: runner.os == 'Linux'
      run: uv sync --all-extras
    - name: Install extra Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install texlive texlive-latex-extra latexmk poppler-utils
        mkdir -p ~/texmf/tex/latex
        wget http://mirrors.ctan.org/graphics/pgf/contrib/quantikz/tikzlibraryquantikz.code.tex --no-check-certificate -P ~/texmf/tex/latex
    - name: About
      if: runner.os == 'Linux'
      run: |
        uv run python -m quantumflow.about
        echo
        pdflatex --version
        pdftocairo -v
    - name: Test coverage with pytest
      if: runner.os == 'Linux'
      run: uv run pytest --cov --cov-fail-under 95
    - name: Lint with ruff
      if: runner.os == 'Linux'
      run: uv run ruff check
    - name: Typecheck with mypy
      if: runner.os == 'Linux'
      run: uv run mypy quantumflow
    - name: Build documentation with sphinx
      if: runner.os == 'Linux'
      run: uv run sphinx-build -M html docs docs/_build
    - name: Test notebooks (against main)
      if: runner.os == 'Linux'
      run: uv run pytest --nbmake tutorial
